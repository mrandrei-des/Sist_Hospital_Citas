<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" xmlns="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="../static/css/compartidos/styles_fonts.css" th:href="@{/css/compartidos/styles_fonts.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_resetElements.css" th:href="@{/css/compartidos/styles_resetElements.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_colors.css" th:href="@{/css/compartidos/styles_colors.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_buttons.css" th:href="@{/css/compartidos/styles_buttons.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_text.css" th:href="@{/css/compartidos/styles_text.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_header.css" th:href="@{/css/compartidos/styles_header.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_footer.css" th:href="@{/css/compartidos/styles_footer.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_main_wrapper.css" th:href="@{/css/compartidos/styles_main_wrapper.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_form.css" th:href="@{/css/compartidos/styles_form.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_menu_lateral.css" th:href="@{/css/compartidos/styles_menu_lateral.css}">
    <link rel="stylesheet" href="../static/css/compartidos/styles_notificaciones.css" th:href="@{/css/compartidos/styles_notificaciones.css}">
    
    <link rel="stylesheet" href="../static/css/miPerfil.css" th:href="@{/css/miPerfil.css}">
</head>
<body>
    <div th:replace="~{fragments::header(mostrarOpcionesMenu=${true}, nombreUsuario=${nombreCompletoUsuario})}"></div>
    <div th:replace="~{fragments::notificacion(${mostrarNotificacion}, ${tipoNotificacion}, ${titulo}, ${detalle})}"></div>

    <main class="main">
        <aside th:replace="~{fragments::menuLateral(${usuarioEsAdmin}, ${idRolUsuario})}"></aside>

        <div class="main__content">
            <div class="main__container main__container--spc-2">
                <div class="main__section">
                    <section class="main__section-title section__profile-picture-container">
                        <div class="profile__picture-container">
                            <div class="profile__picture">
                                <img src="../static/img/pic_profile.svg" th:src="@{/img/pic_profile.svg}" alt="Silueta de un hombre" class="profile__img">
                            </div>
                        </div>
                        <div class="profile__info-container">
                            <h2 class="main__title" th:text="${!esAdminMant} ? 'Mi Perfil' : |Perfil de ${nombreCompletoUsuario}|">
                                Mi Perfil
                            </h2>
                            <p class="main__subtitle" th:text="${!esAdminMant} ? 'Puede actualizar la información de su cuenta' : 'Puede actualizar la información de la cuenta'">
                                Actualice la información de su cuenta
                            </p>
                        </div>
                    </section>

                    <section class="contenedor__formulario__cuenta">
                        <form th:action="@{/actualizar-mi-cuenta}" method="post" class="form" th:object="${usuario}" novalidate>
                            <input type="hidden" th:field="*{id}">

                            <div class="form__section">
                                <div class="form__legend-section">
                                    <p class="form__legend">
                                        <span class="form__icon-box">
                                            <i class="fa-solid fa-user-injured"></i>
                                        </span>
                                        Datos Personales
                                    </p>
                                </div>
                                <div class="form__inputs-section">
                                    <div class="form__group">
                                        <select id="tipoIdentificacion" class="form__input" th:field="*{idTipoIdentificacion}">
                                            <option th:each="tipoIdentificacion : ${listaTipoIdentificacion}" th:value="${tipoIdentificacion.getId()}" th:text="${tipoIdentificacion.getDescripcion()}">Tipo identificación</option>
                                        </select>
                                        <label for="tipoIdentificacion" class="form__label">Tipo Identificación</label>
                                        <p class="form__paragraph--error" th:if="${#fields.hasErrors('idTipoIdentificacion')}" th:errors="*{idTipoIdentificacion}"></p>
                                    </div>
                                    <div class="form__group">
                                        <input type="text" class="form__input" id="identificacion" placeholder="" th:field="*{identificacion}">
                                        <label for="identificacion" class="form__label">Identificación</label>
                                        <p class="form__paragraph--error" th:if="${#fields.hasErrors('identificacion')}" th:errors="*{identificacion}"></p>
                                    </div>
                                    <div class="form__group form__group--spc-2">
                                        <input type="text" class="form__input" id="nombre" placeholder="" th:field="*{nombre}">
                                        <label for="nombre" class="form__label">Nombre</label>
                                        <p class="form__paragraph--error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
                                    </div>
                                    <div class="form__group">
                                        <input type="text" class="form__input" id="primerApellido" placeholder="" th:field="*{primerApellido}">
                                        <label for="primerApellido" class="form__label">Primer Apellido</label>
                                        <p class="form__paragraph--error" th:if="${#fields.hasErrors('primerApellido')}" th:errors="*{primerApellido}"></p>
                                    </div>
                                    <div class="form__group">
                                        <input type="text" class="form__input" id="segundoApellido" placeholder="" th:field="*{segundoApellido}">
                                        <label for="segundoApellido" class="form__label">Segundo Apellido</label>
                                        <p class="form__paragraph--error" th:if="${#fields.hasErrors('segundoApellido')}" th:errors="*{segundoApellido}"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="form__section">
                                <div class="form__legend-section">
                                    <p class="form__legend">
                                        <span class="form__icon-box">
                                            <i class="fa-solid fa-phone-flip"></i>
                                        </span>
                                        Datos para Contacto
                                    </p>
                                </div>
                                <div class="form__inputs-section">
                                    <div class="form__group form__group--spc-2">
                                        <input type="email" class="form__input" id="correo" placeholder="" th:field="*{correoElectronico}">
                                        <label for="correo" class="form__label">Correo</label>
                                        <p class="form__paragraph--error" th:if="${#fields.hasErrors('correoElectronico')}" th:errors="*{correoElectronico}"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="form__section">
                                <div class="form__legend-section">
                                    <p class="form__legend">
                                        <span class="form__icon-box">
                                            <i class="fa-solid fa-lock"></i>
                                        </span>
                                        Datos para Acceso
                                    </p>
                                </div>
                                <div class="form__inputs-section">
                                    <div class="form__group form__group--spc-2" th:if="${!esAdminMant}">
                                        <input type="password" class="form__input" id="password" placeholder="" th:field="*{contrasenna}">
                                        <label for="password" class="form__label">Contraseña</label>
                                        <!-- <p class="input__error" th:if="${#fields.hasErrors('contrasennaHash')}" th:errors="*{contrasennaHash}"></p> -->
                                    </div>
                                    <div class="form__group form__group--spc-2" th:if="${esAdminMant}">
                                        <select id="rolUsuario" class="form__input" th:field="*{idRol}">
                                            <option th:each="rol : ${listaRoles}" th:value="${rol.getId()}" th:text="${rol.getDescripcion()}">Paciente</option>
                                        </select>
                                        <label for="rolUsuario" class="form__label">Rol Usuario</label>
                                        <p class="form__paragraph--error" th:if="${#fields.hasErrors('idRol')}" th:errors="*{idRol}"></p>
                                    </div>
                                    <div class="form__group form__group--spc-2" th:if="${esAdminMant}">
                                        <select id="estadoUsuario" class="form__input" th:field="*{idEstado}">
                                            <option th:each="estado : ${listaEstados}" th:value="${estado.getId()}" th:text="${estado.getDescripcion()}">Activo</option>
                                        </select>
                                        <label for="estadoUsuario" class="form__label">Estado Usuario</label>
                                        <!-- <p class="input__error" th:if="${#fields.hasErrors('idEstado')}" th:errors="*{idEstado}"></p> -->
                                    </div>
                                </div>
                            </div>

                            <div class="form__actions">
                                <button type="submit" class="btn btn__primary">Guardar Cambios</button>
                            </div>
                        </form>
                    </section>
                </div>

                <div class="main__section" th:if="${!esAdmin}">
                    <section class="main__section-title">
                        <h2 class="main__title">
                            Mi historial médico
                        </h2>
                        <p class="main__subtitle">
                            Próximamente
                        </p>
                    </section>

                    <section class="main__section-list">
                    </section>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments::footer}"></div>

    <script src="../static/js/notificaciones.js" th:src="@{/js/notificaciones.js}"></script>
    <script src="../static/js/menuLateral.js" th:src="@{/js/menuLateral.js}"></script>
    <script src="https://kit.fontawesome.com/1de8be47a9.js" crossorigin="anonymous"></script>
</body>
</html>

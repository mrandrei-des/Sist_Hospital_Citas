<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" xmlns="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="../static/css/compartidos/styles_fonts.css">
    <link rel="stylesheet" href="../static/css/compartidos/styles_resetElements.css">
    <link rel="stylesheet" href="../static/css/compartidos/styles_colors.css">
    <link rel="stylesheet" href="../static/css/compartidos/styles_inputs.css">
    <link rel="stylesheet" href="../static/css/compartidos/styles_buttons.css">
    <link rel="stylesheet" href="../static/css/compartidos/styles_header.css">
    <link rel="stylesheet" href="../static/css/compartidos/styles_notificaciones.css">
    <link rel="stylesheet" href="../static/css/compartidos/styles_footer.css">
    <link rel="stylesheet" href="../static/css/compartidos/styles_main_wrapper.css">
    <link rel="stylesheet" href="../static/css/compartidos/styles_menu_lateral.css">
    <link rel="stylesheet" href="../static/css/miPerfil.css">
    
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_fonts.css}">
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_resetElements.css}">
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_colors.css}">
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_inputs.css}">
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_buttons.css}">
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_notificaciones.css}">
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_header.css}">
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_main_wrapper.css}">
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_menu_lateral.css}">
    <link rel="stylesheet" th:href="@{/css/compartidos/styles_footer.css}">
    <link rel="stylesheet" th:href="@{/css/miPerfil.css}">
</head>
<body>
    <div th:replace="~{fragments::header(mostrarOpcionesMenu=${false})}"></div>    
    <div th:replace="~{fragments::notificacion(${mostrarNotificacion}, ${mensajeNotificacion})}"></div>

    <div class="contenedor__wrapper">
        <div th:replace="~{fragments::menuLateral(${usuarioEsAdmin}, ${idRolUsuario})}"></div>

        <main class="contenedor__principal">
            <div class="contenedor__principal__cuenta">
                <div class="contenedor__cuenta__section">

                    <div class="contenedor__section">
                        <section class="contenedor__titulo__pefil">
                            <div class="contenedor__titulo__imagen__perfil">
                                <div class="imagen__perfil">
                                    <img src="../static/img/usuario.png" th:src="@{/img/usuario.png}" alt="Silueta de un hombre">
                                </div>
                            </div>
                            <div class="contenedor__titulo__principal">
                                <h2 class="titulo__principal">
                                    Mi Perfil
                                </h2>
                                <p class="descripcion__principal">
                                    Actualice la información de su cuenta
                                </p>
                            </div>
                        </section>

                        <section class="contenedor__formulario__cuenta">
                            <form th:action="@{/actualizar-mi-cuenta}" method="post" class="formulario__registro" th:object="${usuario}" novalidate>
                                <input type="hidden" th:field="*{id}">

                                <div class="formulario__section__input">
                                    <div class="section__input__encabezado">
                                        <p class="section__input__parrafo">
                                            <span class="section__input__icon">
                                                <i class="fa-solid fa-user-injured"></i>
                                            </span>
                                            Datos Personales
                                        </p>
                                    </div>
                                    <div class="section__input__main">
                                        <div class="contenedor__input">
                                            <select id="tipoIdentificacion" class="input" th:field="*{idTipoIdentificacion}">
                                                <option th:each="tipoIdentificacion : ${listaTipoIdentificacion}" th:value="${tipoIdentificacion.getId()}" th:text="${tipoIdentificacion.getDescripcion()}">Tipo identificación</option>
                                            </select>
                                            <label for="tipoIdentificacion" class="input__label">Tipo Identificación</label>
                                            <p class="input__error" th:if="${#fields.hasErrors('idTipoIdentificacion')}" th:errors="*{idTipoIdentificacion}"></p>
                                        </div>
                                        <div class="contenedor__input">
                                            <input type="text" class="input" id="identificacion" placeholder="" th:field="*{identificacion}">
                                            <label for="identificacion" class="input__label">Identificación</label>
                                            <p class="input__error" th:if="${#fields.hasErrors('identificacion')}" th:errors="*{identificacion}"></p>
                                        </div>
                                        <div class="contenedor__input contenedor__input__sp2">
                                            <input type="text" class="input" id="nombre" placeholder="" th:field="*{nombre}">
                                            <label for="nombre" class="input__label">Nombre</label>
                                            <p class="input__error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
                                        </div>
                                        <div class="contenedor__input">
                                            <input type="text" class="input" id="primerApellido" placeholder="" th:field="*{primerApellido}">
                                            <label for="primerApellido" class="input__label">Primer Apellido</label>
                                            <p class="input__error" th:if="${#fields.hasErrors('primerApellido')}" th:errors="*{primerApellido}"></p>
                                        </div>
                                        <div class="contenedor__input">
                                            <input type="text" class="input" id="segundoApellido" placeholder="" th:field="*{segundoApellido}">
                                            <label for="segundoApellido" class="input__label">Segundo Apellido</label>
                                            <p class="input__error" th:if="${#fields.hasErrors('segundoApellido')}" th:errors="*{segundoApellido}"></p>
                                        </div>
                                    </div>
                                </div>

                                <div class="formulario__section__input">
                                    <div class="section__input__encabezado">
                                        <p class="section__input__parrafo">
                                            <span class="section__input__icon">
                                                <i class="fa-solid fa-phone-flip"></i>
                                            </span>
                                            Datos para Contacto
                                        </p>
                                    </div>
                                    <div class="section__input__main">
                                        <div class="contenedor__input contenedor__input__sp2">
                                            <input type="email" class="input" id="correo" placeholder="" th:field="*{correoElectronico}">
                                            <label for="correo" class="input__label">Correo</label>
                                            <p class="input__error" th:if="${#fields.hasErrors('correoElectronico')}" th:errors="*{correoElectronico}"></p>
                                        </div>
                                    </div>
                                </div>

                                <div class="formulario__section__input">
                                    <div class="section__input__encabezado">
                                        <p class="section__input__parrafo">
                                            <span class="section__input__icon">
                                                <i class="fa-solid fa-lock"></i>
                                            </span>
                                            Datos para Acceso
                                        </p>
                                    </div>
                                    <div class="section__input__main">
                                        <div class="contenedor__input contenedor__input__sp2">
                                            <input type="password" class="input" id="password" placeholder="" th:field="*{contrasenna}">
                                            <label for="password" class="input__label">Contraseña</label>
                                            <!-- <p class="input__error" th:if="${#fields.hasErrors('contrasennaHash')}" th:errors="*{contrasennaHash}"></p> -->
                                        </div>
                                        <div class="contenedor__input contenedor__input__sp2" th:if="${esAdminMant}">
                                            <select id="rolUsuario" class="input" th:field="*{idRol}">
                                                <option th:each="rol : ${listaRoles}" th:value="${rol.getId()}" th:text="${rol.getDescripcion()}">Paciente</option>
                                            </select>
                                            <label for="rolUsuario" class="input__label">Rol Usuario</label>
                                            <p class="input__error" th:if="${#fields.hasErrors('idRol')}" th:errors="*{idRol}"></p>
                                        </div>
                                        <div class="contenedor__input contenedor__input__sp2" th:if="${esAdminMant}">
                                            <select id="estadoUsuario" class="input" th:field="*{idEstado}">
                                                <option th:each="estado : ${listaEstados}" th:value="${estado.getId()}" th:text="${estado.getDescripcion()}">Activo</option>
                                            </select>
                                            <label for="estadoUsuario" class="input__label">Estado Usuario</label>
                                            <p class="input__error" th:if="${#fields.hasErrors('estado.id')}" th:errors="*{estado.id}"></p>
                                        </div>
                                    </div>
                                </div>

                                <div class="formulario__section__button">
                                    <button type="submit" class="btn btn__primary">Guardar Cambios</button>
                                </div>
                            </form>
                        </section>
                    </div>

                    <div class="contenedor__section">
                        <section class="contenedor__titulo__principal">
                            <h2 class="titulo__principal">
                                Mi historial médico
                            </h2>
                            <p class="descripcion__principal">
                                Próximamente
                            </p>
                        </section>
    
                        <section class="contenedor__historial__medico">
                        </section>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <div th:replace="~{fragments::footer}"></div>

    <script src="../static/js/notificaciones.js" th:src="@{/js/notificaciones.js}"></script>
    <script src="../static/js/menuLateral.js" th:src="@{/js/menuLateral.js}"></script>
    <script src="https://kit.fontawesome.com/1de8be47a9.js" crossorigin="anonymous"></script>
</body>
</html>
